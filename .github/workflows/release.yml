# Cut a release end-to-end: validate -> test -> build -> tag -> GitHub Release -> PyPI.
#
# This workflow is the single contract for shipping a release. Manual
# approval comes from the `pypi` GitHub Environment (configured in
# repo Settings -> Environments -> pypi -> Required reviewers); the
# `publish` job pauses there until a reviewer approves.
#
# Authentication uses PyPI Trusted Publishing (OIDC) -- no API tokens.
# The corresponding trusted publisher must be registered on PyPI under
# the project's "Publishing" settings, pointing at this repository, the
# `publish` job, and the `pypi` environment.
#
# Inputs:
#   version  X.Y.Z (no `v` prefix). Must already be present in
#            plotsim_mcp/__init__.py, pyproject.toml, and CHANGELOG.md.
#
# Trigger from the Actions tab (Release -> Run workflow), or:
#   gh workflow run release.yml -f version=0.1.0
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (X.Y.Z, no v prefix)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      # Read input via env to avoid shell injection from workflow_dispatch.
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0  # full history + tags for ls-remote

      - name: Validate version format (X.Y.Z, digits and dots only)
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version '$VERSION' is not in X.Y.Z format (digits and dots only)."
            exit 1
          fi

      - name: Validate plotsim_mcp/__init__.py version line
        run: |
          # Expected exact line: __version__ = "X.Y.Z"
          if ! grep -qxF "__version__ = \"$VERSION\"" plotsim_mcp/__init__.py; then
            echo "::error::plotsim_mcp/__init__.py does not contain: __version__ = \"$VERSION\""
            grep -n '^__version__' plotsim_mcp/__init__.py || true
            exit 1
          fi

      - name: Validate pyproject.toml version line
        run: |
          # Expected exact line in [project]: version = "X.Y.Z"
          if ! grep -qxF "version = \"$VERSION\"" pyproject.toml; then
            echo "::error::pyproject.toml does not contain: version = \"$VERSION\""
            grep -n '^version = ' pyproject.toml || true
            exit 1
          fi

      - name: Validate CHANGELOG.md entry exists and is dated
        run: |
          # Heading format: ## [X.Y.Z] - YYYY-MM-DD (em-dash U+2014, single
          # space each side). Match exactly to refuse undated drafts.
          if ! grep -qE "^## \[$VERSION\] — [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md; then
            echo "::error::CHANGELOG.md missing dated section for $VERSION."
            echo "Expected: ## [$VERSION] — YYYY-MM-DD  (em-dash, not hyphen)"
            grep -nE "^## \[" CHANGELOG.md | head -10 || true
            exit 1
          fi

      - name: Verify tag does not already exist (local + remote)
        run: |
          if git tag -l "v$VERSION" | grep -qx "v$VERSION"; then
            echo "::error::Tag v$VERSION already exists locally."
            exit 1
          fi
          if git ls-remote --tags origin "refs/tags/v$VERSION" | grep -q .; then
            echo "::error::Tag v$VERSION already exists on origin."
            exit 1
          fi

      - name: Extract release notes from CHANGELOG.md
        run: |
          # Use substr() rather than a regex with bracket escapes: gawk
          # treats `\[` in a regex as a plain `[`, which silently turns
          # the version anchor into a character class and matches nothing.
          awk -v ver="$VERSION" '
            BEGIN { vh = "## [" ver "]"; vh_len = length(vh) }
            substr($0, 1, vh_len) == vh { in_section=1; next }
            in_section && substr($0, 1, 4) == "## [" { exit }
            in_section { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::Extracted release notes are empty for $VERSION."
            exit 1
          fi
          echo "----- release notes -----"
          cat release-notes.md
          echo "-------------------------"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: release-notes
          path: release-notes.md

  test:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: ruff check plotsim_mcp/
      - run: python -m pytest --tb=short -q

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: dist
          path: dist/

  tag-and-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write  # tag push + GitHub Release creation
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0  # full history for annotated tag
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: release-notes
      - name: Create and push annotated tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes-file release-notes.md

  publish:
    needs: tag-and-release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/plotsim-mcp
    permissions:
      id-token: write  # OIDC token for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
